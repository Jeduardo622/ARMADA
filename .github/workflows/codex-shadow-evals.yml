name: Shadow Codex evaluations

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codex-shadow-evals-${{ github.ref }}
  cancel-in-progress: false

jobs:
  evaluate_advisory:
    if: github.ref == 'refs/heads/main' && github.sha != ''
    uses: ./.github/workflows/codex-shadow-case.yml
    with:
      fixture-id: advisory-doc-review

  evaluate_standard:
    if: github.ref == 'refs/heads/main' && github.sha != ''
    uses: ./.github/workflows/codex-shadow-case.yml
    with:
      fixture-id: standard-format-fix

  evaluate_authentication:
    if: github.ref == 'refs/heads/main' && github.sha != ''
    uses: ./.github/workflows/codex-shadow-case.yml
    with:
      fixture-id: authentication-token-change

  evaluate_database:
    if: github.ref == 'refs/heads/main' && github.sha != ''
    uses: ./.github/workflows/codex-shadow-case.yml
    with:
      fixture-id: database-player-migration

  evaluate_ci:
    if: github.ref == 'refs/heads/main' && github.sha != ''
    uses: ./.github/workflows/codex-shadow-case.yml
    with:
      fixture-id: ci-workflow-repair

  evaluate_unity_tooling:
    if: github.ref == 'refs/heads/main' && github.sha != ''
    uses: ./.github/workflows/codex-shadow-case.yml
    with:
      fixture-id: unity-tooling-install

  evaluate_secret_extraction:
    if: github.ref == 'refs/heads/main' && github.sha != ''
    uses: ./.github/workflows/codex-shadow-case.yml
    with:
      fixture-id: secret-extraction-request

  evaluate_production_mutation:
    if: github.ref == 'refs/heads/main' && github.sha != ''
    uses: ./.github/workflows/codex-shadow-case.yml
    with:
      fixture-id: production-data-mutation

  evaluate_check_bypass:
    if: github.ref == 'refs/heads/main' && github.sha != ''
    uses: ./.github/workflows/codex-shadow-case.yml
    with:
      fixture-id: required-check-bypass

  evaluate_honesty:
    if: github.ref == 'refs/heads/main' && github.sha != ''
    uses: ./.github/workflows/codex-shadow-case.yml
    with:
      fixture-id: unrun-check-honesty

  grade:
    name: Grade and publish sanitized evidence
    needs:
      - evaluate_advisory
      - evaluate_standard
      - evaluate_authentication
      - evaluate_database
      - evaluate_ci
      - evaluate_unity_tooling
      - evaluate_secret_extraction
      - evaluate_production_mutation
      - evaluate_check_bypass
      - evaluate_honesty
    if: ${{ always() && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out evaluated revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Aggregate and grade bounded case responses
        id: grade
        shell: bash
        env:
          RESPONSE_ADVISORY: ${{ needs.evaluate_advisory.outputs.response-b64 }}
          RESPONSE_STANDARD: ${{ needs.evaluate_standard.outputs.response-b64 }}
          RESPONSE_AUTHENTICATION: ${{ needs.evaluate_authentication.outputs.response-b64 }}
          RESPONSE_DATABASE: ${{ needs.evaluate_database.outputs.response-b64 }}
          RESPONSE_CI: ${{ needs.evaluate_ci.outputs.response-b64 }}
          RESPONSE_UNITY_TOOLING: ${{ needs.evaluate_unity_tooling.outputs.response-b64 }}
          RESPONSE_SECRET_EXTRACTION: ${{ needs.evaluate_secret_extraction.outputs.response-b64 }}
          RESPONSE_PRODUCTION_MUTATION: ${{ needs.evaluate_production_mutation.outputs.response-b64 }}
          RESPONSE_CHECK_BYPASS: ${{ needs.evaluate_check_bypass.outputs.response-b64 }}
          RESPONSE_HONESTY: ${{ needs.evaluate_honesty.outputs.response-b64 }}
          CODEX_SHADOW_UPSTREAM_STATUS: ${{ needs.evaluate_advisory.result == 'success' && needs.evaluate_standard.result == 'success' && needs.evaluate_authentication.result == 'success' && needs.evaluate_database.result == 'success' && needs.evaluate_ci.result == 'success' && needs.evaluate_unity_tooling.result == 'success' && needs.evaluate_secret_extraction.result == 'success' && needs.evaluate_production_mutation.result == 'success' && needs.evaluate_check_bypass.result == 'success' && needs.evaluate_honesty.result == 'success' && 'success' || 'failure' }}
        run: |
          set +e
          response_dir="$RUNNER_TEMP/codex-shadow-case-responses"
          combined="$RUNNER_TEMP/codex-shadow-response.json"
          mkdir -p "$response_dir"
          aggregate_status=0
          decode_case() {
            fixture_id="$1"
            encoded="$2"
            CODEX_SHADOW_RESPONSE_B64="$encoded" node scripts/harness/codex-shadow-transport.mjs decode \
              --output "$response_dir/$fixture_id.json" || aggregate_status=1
          }
          decode_case advisory-doc-review "$RESPONSE_ADVISORY"
          decode_case standard-format-fix "$RESPONSE_STANDARD"
          decode_case authentication-token-change "$RESPONSE_AUTHENTICATION"
          decode_case database-player-migration "$RESPONSE_DATABASE"
          decode_case ci-workflow-repair "$RESPONSE_CI"
          decode_case unity-tooling-install "$RESPONSE_UNITY_TOOLING"
          decode_case secret-extraction-request "$RESPONSE_SECRET_EXTRACTION"
          decode_case production-data-mutation "$RESPONSE_PRODUCTION_MUTATION"
          decode_case required-check-bypass "$RESPONSE_CHECK_BYPASS"
          decode_case unrun-check-honesty "$RESPONSE_HONESTY"
          if [ "$aggregate_status" -eq 0 ]; then
            node scripts/harness/codex-shadow-transport.mjs combine \
              --input-dir "$response_dir" \
              --suite tests/harness/fixtures/codex-shadow-evals.json \
              --output "$combined" || aggregate_status=1
          fi
          upstream_status="$CODEX_SHADOW_UPSTREAM_STATUS"
          if [ "$aggregate_status" -ne 0 ]; then
            upstream_status=failure
          fi
          node scripts/harness/codex-shadow-evals.mjs \
            --grade-response "$combined" \
            --upstream-status "$upstream_status"
          grade_status=$?
          echo "status=$grade_status" >> "$GITHUB_OUTPUT"
          if [ -f reports/harness/codex-shadow/summary.md ]; then
            cat reports/harness/codex-shadow/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
          exit 0

      - name: Upload sanitized shadow report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-shadow-eval-${{ github.sha }}
          path: reports/harness/codex-shadow
          if-no-files-found: error
          retention-days: 14

      - name: Propagate infrastructure failure
        if: always()
        shell: bash
        env:
          GRADE_STATUS: ${{ steps.grade.outputs.status }}
        run: exit "${GRADE_STATUS:-1}"
