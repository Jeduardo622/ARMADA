name: Engineering verification

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: engineering-verification-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scope:
    name: Resolve verification scope
    runs-on: ubuntu-latest
    outputs:
      unity_required: ${{ steps.scope.outputs.unity_required }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Resolve verification scope
        id: scope
        run: node scripts/harness/resolve-ci-scope.mjs
        env:
          HARNESS_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
          FORCE_UNITY: ${{ github.event_name == 'push' && '1' || '0' }}

  core:
    name: Core verification
    needs: scope
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run secret-free core checks
        run: |
          npm run verify:structure
          npm run test:harness
          npm run lint
          npm run typecheck
          npm test
          npm run build
          npm run verify:contracts
          npm run verify:database
          npm run verify:deployment
          npm run verify:unity
          npm run verify:dependencies
          npm run verify:secrets
          npm run verify:policy

  unity:
    name: Licensed Unity verification
    needs: scope
    if: needs.scope.outputs.unity_required == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify Unity CI credentials
        shell: bash
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          missing=()
          for name in UNITY_LICENSE UNITY_EMAIL UNITY_PASSWORD; do
            if [ -z "${!name}" ]; then missing+=("$name"); fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Required Unity verification cannot run because trusted credentials are unavailable: ${missing[*]}"
            exit 1
          fi

      - name: Run Unity EditMode tests
        id: unity-editmode
        uses: game-ci/unity-test-runner@0ff419b913a3630032cbe0de48a0099b5a9f0ed9 # v4.3.1
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: unity
          unityVersion: 2022.3.62f3
          customImage: unityci/editor:ubuntu-2022.3.62f3-base-3.2.2@sha256:5d7a21ca16b52434b3d7a761d15a48def4cc38fc41fada82145f87c5e92c09c3
          testMode: editmode
          artifactsPath: reports/unity/editmode
          customParameters: -assemblyNames Armada.Client.EditModeTests

      - name: Run Unity PlayMode tests
        id: unity-playmode
        uses: game-ci/unity-test-runner@0ff419b913a3630032cbe0de48a0099b5a9f0ed9 # v4.3.1
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: unity
          unityVersion: 2022.3.62f3
          customImage: unityci/editor:ubuntu-2022.3.62f3-base-3.2.2@sha256:5d7a21ca16b52434b3d7a761d15a48def4cc38fc41fada82145f87c5e92c09c3
          testMode: playmode
          artifactsPath: reports/unity/playmode
          customParameters: -assemblyNames Armada.Client.PlayModeTests

      - name: Restore Unity artifact ownership
        if: always()
        shell: bash
        run: |
          if [ -d reports ]; then
            sudo chown -R "$(id -u):$(id -g)" reports
          fi

      - name: Record Unity CI evidence
        run: node scripts/harness/unity-ci-evidence.mjs
        env:
          UNITY_CI_EVIDENCE_PATH: reports/harness/unity-ci-evidence.json
          UNITY_EDITMODE_RESULTS: reports/unity/editmode
          UNITY_PLAYMODE_RESULTS: reports/unity/playmode

      - name: Upload Unity verification evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unity-verification
          path: reports
          if-no-files-found: warn

  verify:
    name: Verify local contract
    needs: [scope, core, unity]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Restore Unity verification evidence
        if: needs.scope.outputs.unity_required == 'true' && needs.unity.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unity-verification
          path: reports

      - name: Run aggregate engineering harness
        shell: bash
        env:
          HARNESS_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
          UNITY_CI_EVIDENCE_PATH: ${{ needs.scope.outputs.unity_required == 'true' && 'reports/harness/unity-ci-evidence.json' || '' }}
        run: |
          set +e
          npm run verify:local
          harness_status=$?
          prerequisite_status=0

          if [ "${{ needs.scope.result }}" != "success" ]; then
            echo "::error::Verification scope resolution did not pass: ${{ needs.scope.result }}"
            prerequisite_status=1
          fi
          if [ "${{ needs.core.result }}" != "success" ]; then
            echo "::error::Secret-free core verification did not pass: ${{ needs.core.result }}"
            prerequisite_status=1
          fi
          if [ "${{ needs.scope.outputs.unity_required }}" = "true" ] && [ "${{ needs.unity.result }}" != "success" ]; then
            echo "::error::Licensed Unity verification was required but did not pass: ${{ needs.unity.result }}"
            prerequisite_status=1
          fi

          if [ "$harness_status" -ne 0 ] || [ "$prerequisite_status" -ne 0 ]; then
            exit 1
          fi

      - name: Upload harness report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: harness-report
          path: reports/harness/latest.json
          if-no-files-found: warn
