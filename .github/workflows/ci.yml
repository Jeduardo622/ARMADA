name: backend-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    if: hashFiles('package.json') != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint --if-present
      - run: npm test --if-present
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: |
          if [ -f package.json ]; then npm ci; else echo "No package.json"; fi
      - name: Lint
        run: |
          if [ -f package.json ]; then npm run lint --if-present; else echo "No lint"; fi
      - name: Tests
        run: |
          if [ -f package.json ]; then npm test --if-present; else echo "No tests"; fi
      - name: Placeholder sim/replay/contract checks
        run: echo "Add sim/replay/contract checks when available"

