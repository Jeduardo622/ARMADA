name: Engineering verification

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify local contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run engineering harness
        run: npm run verify:local
        env:
          HARNESS_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}

      - name: Upload harness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-report
          path: reports/harness/latest.json
          if-no-files-found: warn
