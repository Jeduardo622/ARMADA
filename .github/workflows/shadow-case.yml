name: Isolated shadow evaluation case

on:
  workflow_call:
    inputs:
      fixture-id:
        description: Trusted fixture ID from the committed public suite
        required: true
        type: string
      provider:
        description: Evaluation provider (codex or claude)
        required: false
        default: claude
        type: string
    outputs:
      response-b64:
        description: Bounded base64 response envelope
        value: ${{ jobs.evaluate.outputs.response-b64 }}
    secrets:
      CODEX_OPENAI_API_KEY:
        description: Repository-scoped key for Codex shadow evaluation
        required: false
      CLAUDE_ANTHROPIC_API_KEY:
        description: Repository-scoped key for Claude shadow evaluation
        required: false

permissions:
  contents: read

jobs:
  evaluate:
    name: Evaluate ${{ inputs.fixture-id }} (${{ inputs.provider }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: shadow-evals
    outputs:
      response-b64: ${{ steps.transport.outputs.response-b64 }}
    steps:
      - name: Validate provider selection
        shell: bash
        env:
          PROVIDER: ${{ inputs.provider }}
        run: |
          set -euo pipefail
          case "$PROVIDER" in
            codex|claude) ;;
            *) echo "unsupported shadow evaluation provider" >&2; exit 1 ;;
          esac

      - name: Check out trusted revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          path: source

      - name: Build one-case isolated workspace
        shell: bash
        env:
          FIXTURE_ID: ${{ inputs.fixture-id }}
        run: |
          set -euo pipefail
          eval_root="$RUNNER_TEMP/shadow-workspace"
          install -D -m 0444 source/scripts/harness/shadow-transport.mjs "$eval_root/scripts/harness/shadow-transport.mjs"
          install -D -m 0444 source/scripts/harness/claude-shadow-request.mjs "$eval_root/scripts/harness/claude-shadow-request.mjs"
          node source/scripts/harness/build-shadow-prompt.mjs \
            --source-root source \
            --fixture-id "$FIXTURE_ID" \
            --output "$eval_root/prompt.md" \
            --schema-output "$eval_root/schema.json"
          rm -rf "$GITHUB_WORKSPACE/source"
          test ! -e "$eval_root/.git"
          test ! -e "$eval_root/tests/harness/fixtures/shadow-evals.json"
          test ! -e "$eval_root/tests/harness/fixtures/shadow-expectations.json"
          test ! -e "$eval_root/tests/harness/fixtures/shadow-responses.json"
          test "$(find "$eval_root" -type f -name '*.md' | wc -l)" -eq 1
          test "$(find "$eval_root" -type f -name '*.json' | wc -l)" -eq 1

      - name: Run isolated read-only evaluation
        if: inputs.provider == 'codex'
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56
        with:
          openai-api-key: ${{ secrets.CODEX_OPENAI_API_KEY }}
          prompt-file: ${{ runner.temp }}/shadow-workspace/prompt.md
          output-file: ${{ runner.temp }}/shadow-workspace/response.json
          working-directory: ${{ runner.temp }}/shadow-workspace
          codex-version: 0.144.1
          model: gpt-5.3-codex
          effort: high
          safety-strategy: drop-sudo
          permission-profile: ":read-only"
          output-schema-file: ${{ runner.temp }}/shadow-workspace/schema.json
          codex-args: '["--ephemeral"]'

      - name: Run isolated read-only Claude evaluation
        if: inputs.provider == 'claude'
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          node "$RUNNER_TEMP/shadow-workspace/scripts/harness/claude-shadow-request.mjs" \
            --prompt "$RUNNER_TEMP/shadow-workspace/prompt.md" \
            --schema "$RUNNER_TEMP/shadow-workspace/schema.json" \
            --output "$RUNNER_TEMP/shadow-workspace/response.json" \
            --model claude-sonnet-5

      - name: Encode and delete raw case response
        id: transport
        shell: bash
        run: |
          node "$RUNNER_TEMP/shadow-workspace/scripts/harness/shadow-transport.mjs" encode \
            --input "$RUNNER_TEMP/shadow-workspace/response.json" \
            --github-output "$GITHUB_OUTPUT"
